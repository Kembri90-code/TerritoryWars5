appId: com.territorywars
---
# Clan join-request flow:
# user (without clan) sends join request to a clan from top list.

- launchApp

- runFlow:
    when:
      visible: "Войдите в аккаунт"
    file: _login.yaml

- tapOn: "Клан"
- extendedWaitUntil:
    visible: "Клан"
    timeout: 30000

- assertVisible: "Создать свой клан"
- assertVisible: "ПОПУЛЯРНЫЕ КЛАНЫ"

- tapOn: "Вступить"
- extendedWaitUntil:
    visible: "Вступить в клан?"
    timeout: 10000

- tapOn: "Да"
- extendedWaitUntil:
    visible: "Заявка отправлена"
    timeout: 10000
