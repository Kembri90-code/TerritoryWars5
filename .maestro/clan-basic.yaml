appId: com.territorywars
---
# Clan smoke:
# login (if needed) -> open Clan tab -> open create form -> validate fields -> back.
# This flow is non-destructive: it does NOT create a clan.

- launchApp

- runFlow:
    when:
      visible: "Войдите в аккаунт"
    file: _login.yaml

- extendedWaitUntil:
    visible: "Клан"
    timeout: 30000

- tapOn: "Клан"
- extendedWaitUntil:
    visible: "Клан"
    timeout: 30000

# Branch A: user is not in clan, can open create flow.
- runFlow:
    when:
      visible: "Создать свой клан"
    commands:
      - tapOn: "Создать свой клан"
      - assertVisible: "Создать клан"
      - assertVisible: "Название клана"
      - assertVisible: "Тег (2–4 символа)"
      - assertVisible: "Цвет клана"
      - tapOn: "Назад"
      - assertVisible: "Клан"

# Branch B: user already in clan.
- runFlow:
    when:
      visible: "Покинуть клан"
    commands:
      - assertVisible: "Участники"
