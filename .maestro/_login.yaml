appId: com.territorywars
---
# Reusable login flow.
# Requires environment variables:
# - MAESTRO_EMAIL
# - MAESTRO_PASSWORD

- extendedWaitUntil:
    visible: "Войдите в аккаунт"
    timeout: 30000

- tapOn: "Email"
- inputText: "${MAESTRO_EMAIL}"

- tapOn: "Пароль"
- inputText: "${MAESTRO_PASSWORD}"

- hideKeyboard
- tapOn: "Войти"

# Wait until main app shell is rendered.
- extendedWaitUntil:
    visible: "Карта"
    timeout: 30000
